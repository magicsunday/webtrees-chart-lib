name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
            - run: npm ci
            # Single source of truth: the workflow runs exactly the local `ci:test`
            # gate (biome ci + typecheck + cpd + jest), so GitHub CI can never be
            # less strict than a local check.
            - run: npm run ci:test
            - run: npm run build
