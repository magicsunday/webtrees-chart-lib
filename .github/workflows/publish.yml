name: Publish Package

on:
  push:
    # Match semver tags with or without a leading "v". The repo switched to
    # bare semver (1.11.0, not v1.11.0); the old "v*" filter then silently
    # never fired, so GitHub Packages publishing stopped at v1.5.1. "*.*.*"
    # catches both conventions and cannot regress to a no-match.
    tags: ["*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@magicsunday"
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
